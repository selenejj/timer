<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교용 타이머</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(240, 147, 251, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2),
                        0 0 1px rgba(255, 255, 255, 0.5) inset;
            padding: 50px;
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 45px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .timer-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 95px;
            font-weight: 700;
            text-align: center;
            padding: 50px 40px;
            border-radius: 25px;
            margin-bottom: 45px;
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.35),
                        0 0 1px rgba(255, 255, 255, 0.3) inset;
            transition: all 0.3s ease;
            position: relative;
        }

        .timer-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 50%);
            border-radius: 25px;
        }

        .input-group {
            display: flex;
            gap: 25px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-field label {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field input {
            width: 90px;
            padding: 14px 12px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #e8e8e8;
            border-radius: 15px;
            font-weight: 700;
            color: #333;
            background: #f9f9f9;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: scale(1.05);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        button {
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.4s ease;
        }

        button:hover::before {
            left: 100%;
        }

        .btn-start, .btn-set, .btn-pause {
            color: white;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            min-width: 120px;
        }

        .btn-start:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .btn-start:active {
            transform: translateY(-2px);
        }

        .btn-pause {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3);
            min-width: 120px;
        }

        .btn-pause:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
        }

        .btn-pause:active {
            transform: translateY(-2px);
        }

        .btn-reset {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #333;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.2);
        }

        .btn-reset:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(79, 172, 254, 0.3);
        }

        .btn-reset:active {
            transform: translateY(-2px);
        }

        .btn-set {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #333;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(67, 233, 123, 0.2);
            min-width: 140px;
        }

        .btn-set:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(67, 233, 123, 0.3);
        }

        .btn-set:active {
            transform: translateY(-2px);
        }

        .preset-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .preset-btn {
            padding: 11px 24px;
            font-size: 13px;
            background: #f5f5f5;
            color: #555;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .preset-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(240, 147, 251, 0.1) 100%);
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.15);
        }

        .preset-btn:active {
            transform: translateY(-1px);
        }

        .status {
            text-align: center;
            font-size: 14px;
            color: #999;
            font-weight: 500;
            height: 24px;
            letter-spacing: 0.3px;
        }

        .status.active {
            color: #667eea;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }

        .finished {
            color: #f5576c;
            font-weight: 700;
            font-size: 15px;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 26px;
                margin-bottom: 35px;
            }

            .timer-display {
                font-size: 60px;
                padding: 35px 25px;
                letter-spacing: 4px;
                margin-bottom: 35px;
            }

            .input-group {
                gap: 20px;
                margin-bottom: 30px;
            }

            .input-field input {
                width: 75px;
                padding: 12px 10px;
                font-size: 18px;
            }

            .controls {
                gap: 10px;
                margin-bottom: 25px;
            }

            button {
                padding: 12px 22px;
                font-size: 14px;
                min-width: 90px;
            }

            .preset-btn {
                padding: 9px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ 타이머</h1>
        
        <div class="timer-display" id="display">00:00</div>

        <div class="input-group">
            <div class="input-field">
                <label for="minutes">분</label>
                <input type="number" id="minutes" value="5" min="0" max="59">
            </div>
            <div class="input-field">
                <label for="seconds">초</label>
                <input type="number" id="seconds" value="0" min="0" max="59">
            </div>
        </div>

        <div class="controls">
            <button class="btn-set" onclick="setTimer()">⚙️ 설정</button>
            <button class="btn-start" id="startBtn" onclick="startTimer()">▶ 시작</button>
            <button class="btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display:none;">⏸ 일시정지</button>
            <button class="btn-reset" onclick="resetTimer()">🔄 리셋</button>
        </div>

        <div class="preset-buttons">
            <button class="preset-btn" onclick="setPreset(1)">1분</button>
            <button class="preset-btn" onclick="setPreset(3)">3분</button>
            <button class="preset-btn" onclick="setPreset(5)">5분</button>
            <button class="preset-btn" onclick="setPreset(10)">10분</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        let timerInterval;
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let isRunning = false;

        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const status = document.getElementById('status');

        function updateDisplay() {
            const mins = Math.floor(remainingSeconds / 60);
            const secs = remainingSeconds % 60;
            display.textContent = 
                String(mins).padStart(2, '0') + ':' + 
                String(secs).padStart(2, '0');

            // 10초 이하일 때 색상 변경
            if (remainingSeconds <= 10 && remainingSeconds > 0) {
                display.style.color = '#f5576c';
            } else if (remainingSeconds === 0) {
                display.style.color = '#ff6b6b';
            } else {
                display.style.color = 'white';
            }
        }

        function setTimer() {
            if (isRunning) {
                alert('타이머가 실행 중입니다. 먼저 리셋해주세요.');
                return;
            }

            let mins = parseInt(minutesInput.value) || 0;
            let secs = parseInt(secondsInput.value) || 0;

            // 입력값 범위 제한
            mins = Math.max(0, Math.min(59, mins));
            secs = Math.max(0, Math.min(59, secs));

            minutesInput.value = mins;
            secondsInput.value = secs;

            totalSeconds = mins * 60 + secs;
            remainingSeconds = totalSeconds;

            if (totalSeconds === 0) {
                alert('시간을 입력해주세요.');
                minutesInput.value = 5;
                minutesInput.focus();
                return;
            }

            updateDisplay();
            status.textContent = '✓ 타이머가 설정되었습니다';
            status.classList.add('active');
            status.classList.remove('finished');
        }

        function startTimer() {
            if (remainingSeconds === 0) {
                alert('먼저 위의 설정 버튼을 눌러 시간을 설정해주세요.');
                return;
            }

            if (isRunning) return;

            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            minutesInput.disabled = true;
            secondsInput.disabled = true;
            status.textContent = '⏱️ 타이머 실행 중...';
            status.classList.add('active');

            timerInterval = setInterval(() => {
                remainingSeconds--;
                updateDisplay();

                if (remainingSeconds === 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    startBtn.style.display = 'inline-block';
                    pauseBtn.style.display = 'none';
                    minutesInput.disabled = false;
                    secondsInput.disabled = false;
                    
                    // 완료 알림
                    playNotification();
                    status.textContent = '🎉 시간이 끝났습니다!';
                    status.classList.add('finished');
                    status.classList.remove('active');
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;

            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            status.textContent = '⏸️ 일시정지 중...';
            status.classList.add('active');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            minutesInput.disabled = false;
            secondsInput.disabled = false;
            
            remainingSeconds = 0;
            updateDisplay();
            status.textContent = '';
            status.classList.remove('finished');
            status.classList.remove('active');
        }

        function setPreset(minutes) {
            resetTimer();
            minutesInput.value = minutes;
            secondsInput.value = 0;
            setTimer();
        }

        function playNotification() {
            // 웹 Audio API를 이용한 소리 생성
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // 3번 비프음 재생
                let count = 0;
                const playBeep = () => {
                    if (count < 3) {
                        oscillator.frequency.value = 800;
                        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                        
                        setTimeout(playBeep, 300);
                        count++;
                    }
                };

                playBeep();
            } catch (e) {
                console.log('음성 재생 불가');
            }
        }

        // 초기 설정
        setTimer();
    </script>
</body>
</html>
